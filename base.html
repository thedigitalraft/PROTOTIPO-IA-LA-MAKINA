<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Makina - Requests</title>
<style>
:root { --bg: #f8f7f4; --surface: #ffffff; --border: #e2e0d8; --text: #1a1a18; --muted: #6b6b67; --ia-bg: #eef4ff; --ia-border: #b8d0f8; --ia-text: #1a3a6b; --warn-bg: #fff8ec; --warn-border: #fad88a; --warn-text: #7a4f00; --green-bg: #edf7ef; --green-text: #1a5c2a; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }
a { color: var(--text); text-decoration: none; }
.topbar { border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.logo { font-size: 15px; font-weight: bold; }
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 2px; border: 1px solid; }
.badge-recibido { background: #f0f0ee; color: var(--muted); border-color: var(--border); }
.badge-espera { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
.badge-comenzado { background: var(--green-bg); color: var(--green-text); border-color: #a8d8b0; }
.badge-revision { background: #eef4ff; color: #1a3a6b; border-color: #b8d0f8; }
.badge-entregado { background: #1a1a18; color: #f8f7f4; border-color: #1a1a18; }
.badge-riesgo-alto { background: #fff0f0; color: #8b1a1a; border-color: #f8b8b8; }
.badge-riesgo-medio { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
.badge-riesgo-bajo { background: var(--green-bg); color: var(--green-text); border-color: #a8d8b0; }
.ia-block { background: var(--ia-bg); border: 1px solid var(--ia-border); border-radius: 4px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.ia-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12px; color: var(--ia-text); font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; }
.ia-dot { width: 8px; height: 8px; border-radius: 50%; background: #378ADD; }
.form-group { margin-bottom: 1.25rem; }
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
input, textarea, select { width: 100%; font-family: inherit; font-size: 14px; border: 1px solid var(--border); background: var(--surface); padding: 9px 12px; border-radius: 3px; color: var(--text); }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--text); }
textarea { resize: vertical; min-height: 100px; }
.btn { font-family: inherit; font-size: 13px; padding: 8px 18px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); }
.btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
.divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">La Makina / requests</a>
  <a href="/nuevo"><button class="btn btn-primary">+ Nuevo pedido</button></a>
</div>
{% block content %}{% endblock %}
</body>
</html>
