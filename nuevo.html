{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width:620px;">
  <div style="margin-bottom:2rem;">
    <a href="/" style="font-size:12px; color:var(--muted);">← Volver</a>
    <h1 style="font-size:20px; font-weight:bold; margin-top:0.5rem;">Nuevo pedido</h1>
    <p style="font-size:13px; color:var(--muted); margin-top:4px;">La IA analizara el brief al enviarlo y detectara gaps antes de asignarlo al equipo.</p>
  </div>
  <form method="POST" action="/nuevo" id="form-nuevo">
    <div class="form-group">
      <label>Cliente</label>
      <input type="text" name="cliente" placeholder="Ej: MetLife, BBVA..." required>
    </div>
    <div class="form-group">
      <label>Tipo de pedido</label>
      <select name="tipo" required>
        {% for tipo in tipos %}
        <option value="{{ tipo }}">{{ tipo }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Brief del cliente</label>
      <textarea name="brief" rows="6" placeholder="Describe que necesitas, para que se va a usar, referencias, etc." required></textarea>
    </div>
    <div class="form-group">
      <label>Deadline</label>
      <input type="date" name="deadline">
    </div>
    <div class="ia-block" style="margin-bottom:1.5rem;">
      <div class="ia-header"><div class="ia-dot"></div> Analisis automatico de IA</div>
      <p style="font-size:13px; color:var(--ia-text);">Al enviar, DeepSeek analizara el brief y generara un diagnostico de gaps. Tarda unos 10 segundos.</p>
    </div>
    <button type="submit" class="btn btn-primary" id="btn-submit">Enviar pedido →</button>
  </form>
</div>
<script>
document.getElementById('form-nuevo').addEventListener('submit', function() {
  var btn = document.getElementById('btn-submit');
  btn.textContent = 'Analizando brief...';
  btn.disabled = true;
});
</script>
{% endblock %}
